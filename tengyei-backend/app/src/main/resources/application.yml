spring:
  application:
    name: tengyei-backend
  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 10MB
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080
  servlet:
    context-path: /

upload:
  path: /opt/tengyei/uploads

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

tengyei:
  jwt:
    secret: ${TENGYEI_JWT_SECRET:TengYeiJwtSecretKey2026ForLocalDevOnly!!}
    expire-hours: 2
    refresh-before-minutes: 30
